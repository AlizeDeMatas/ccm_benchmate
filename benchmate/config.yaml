

project:
  name: benchmate
  description: "This is a description of the project with as many biological details as possible to help search algorithms 
  especially in the literature to filter out irrelevant results. This should be at the very least a decent sized paragraph but 
  not 100s pages of text. Currently there is no support for images or tables in (unless formatted as markdown) to be used in 
  project descriptions."

knowledge_base:
  conn_string: #this is the connection string to the database, it must be a postgres database connection

literature:
  table_prompt: "You are an expert biologist who is responsible for reading and interpreting scientific tables. For a given table from a scientific paper interpret the table. 
  Do not provide comments on whether the table is well done or not. Do not provide extra text on describing that you are looking at table from a scientific publication. 
  Give an overall conclusion about what the tables tells us."
  figure_prompt: "You are an expert biologist who is responsible for reading and interpreting scientific figures. For a given figure from a 
  scientific paper interpret the figure. Do not provide comments on whether the figure is well done or not. Do not provide extra text on
   describing that you are looking at figure from a scientific publication. Whenever possible very briefly describe each sections of the figure 
   and then give an overall conclusion about what the figure tells us"
  layout_model: #this is specific to literature, other models will not be using it also uses a specific model
    config: /hpf/largeprojects/ccmbio/acelik_files/ccm_benchmate/benchmate/models/lp_model/config.yaml
    model: /hpf/largeprojects/ccmbio/acelik_files/ccm_benchmate/benchmate/models/lp_model/pytorch_model.bin
    kwargs: {}
  pdf_path: benchmate/data/pdfs
  openalex_api_key: api_key_goes_here

# all these models will be shared with other data modalities
inference:
  device: cuda

  interpret_image: #this is the model that is used to interpret figures
    cache_dir: /hpf/largeprojects/ccmbio/acelik_files/ccm_benchmate/benchmate/models/hf_models
    model_name: Qwen/Qwen2.5-VL-3B-Instruct
    model_kwargs: {}
    processor_kwargs: {}
    model_class: Qwen2_5_VLForConditionalGeneration
    processor_class: AutoProcessor
    generation_kwargs:
      max_new_tokens: 100 # other generation kwargs that you want to pass in, this is passed to model.generate
    quantization_kwargs: {} # if you want to use bitsandbytes quantization you can pass it here

  embeddings: #this is the model that is used to embed the text
    cache_dir: /hpf/largeprojects/ccmbio/acelik_files/ccm_benchmate/benchmate/models/hf_models
    model_name: Qwen/Qwen3-VL-Embedding-8B
    model_kwargs: {}
    processor_kwargs: {}
    prompt: "Represent this scientific document for retrieval, focusing on methodology, data, and technical scientific meaning."
    quantization_kwargs:
      load_in_4bit: true
      bnb_4bit_quant_type: nf4
      bnb_4bit_use_double_quant: true
    dimensions: 4096

  rerank:
    cache_dir: /hpf/largeprojects/ccmbio/acelik_files/ccm_benchmate/benchmate/models/hf_models
    model_name: Qwen/Qwen3-VL-Reranker-8B
    model_kwargs: { }
    processor_kwargs: { }
    quantization_kwargs: {}
    prompt: "
    You are a scientific reranking model.
    Evaluate how relevant the candidate is to the query.
    Consider:
      - Exact match of scientific concept, method, or finding
      - Correct interpretation of figures or tables if present
      - Alignment of key variables and outcomes

    Penalize:
      - Partial matches
      - Different experimental setups
      - Superficial keyword overlap

    Query:
      {query}

    Candidate:
      {candidate}

    Output only:
    Score: <0-100>
"

  semantic_chunk:
    chunking_model: /hpf/largeprojects/ccmbio/acelik_files/ccm_benchmate/benchmate/models/m2v_model
    chunking_kwargs:
      chunk_size: 100
      min_sentences: 1
      threshold: 0.75

  extract_info:
    cache_dir: /hpf/largeprojects/ccmbio/acelik_files/ccm_benchmate/benchmate/models/hf_models
    model_name: google/medgemma-27b-text-it
    model_class: AutoModelForCausalLM
    model_kwargs: {}
    tokenizer_kwargs: {}
    quantization_kwargs:
      load_in_4bit: true
      bnb_4bit_quant_type: nf4
      bnb_4bit_use_double_quant: true
    generation_kwargs:
       max_new_tokens: 250
    sys_prompt: "You are an expert scientist whose sole function is to extract structured information from CV text and return it as valid JSON.

    ## Output Rules
    - Return ONLY valid JSON. No prose, no markdown, no preamble, no code fences.
    - If a field is not found, use null for scalar values and [] for arrays.
    - Never hallucinate, infer, or embellish any information not explicitly present in the text.
    
    ## Formatting Rules
    - Normalize whitespace: strip leading/trailing spaces, collapse internal multiple spaces.
    - Preserve original casing for proper nouns
    - Return all arrays in the order they appear in the source text."


#these are binary locations if needed, you can leave just as the callable if they are in your $PATH
#if you leave them blank they you will get a warning and they will not be available
alignment:
  folddisco_bin: folddisco
  folddisco_db_root: benchmate/data/folddisco_db
  foldseek_bin: foldseek
  foldseek_db_root: benchmate/data/foldseek_db #this is where all the databases will be created/downloaded etc.
  mmseqs2_bin: mmseqs
  mmseqs_db_root: benchmate/data/mmseqs_db #same as above
  blast_bin:
    blastn: blastn
    blastp: blastp
    tblastn: tblastn
    tblastx: tblastx
    blastx: blastx
  blast_db_root: benchmate/data/blast_db #same as above

api:
  email: mail@mail.com
  biogrid_api_key:
  alphagenome_api_key:

structure:
  pdb_path: benchmate/data/pdb #this is where all the pdb files are stored, you can usually override it in functions if you want to but this will be the default

molecule:
  fingerprint_dim: 2048
  fingerprint_radius: 2

sequence: #nothing here yet
genome: #nothing here yet, pysam comes with samtools











